services:
  rotation-api:
    image: ghcr.io/xyl0se/rotation-app-api:latest
    container_name: rotation-api
    user: "1026:100"
    restart: unless-stopped
    volumes:
      - ${ROTATION_HOST_DATA_PATH:-./rotation-data}:/rotation-data:rw
      - ${ROTATION_HOST_MUSIC_PATH:?Set ROTATION_HOST_MUSIC_PATH to the absolute host music path}:/music:ro
    environment:
      - ROTATION_DATA_DIR=/rotation-data/data
      - ROTATION_MUSIC_PATH=/music
      - ROTATION_WORKSPACE_PATH=/rotation-data
      - ROTATION_SYNCTHING_ROOT=/rotation-data/exports/current-rotation
      - ROTATION_WRITE_TOKEN=${ROTATION_WRITE_TOKEN:?Set ROTATION_WRITE_TOKEN to a non-blank generated secret}
      - ROTATION_CORS_ORIGINS=${ROTATION_CORS_ORIGINS:-}
      - ROTATION_BACKUP_ENABLED=${ROTATION_BACKUP_ENABLED:-true}
      - ROTATION_BACKUP_CRON=${ROTATION_BACKUP_CRON:-0 * * * *}
      - ROTATION_BACKUP_RETENTION_COUNT=${ROTATION_BACKUP_RETENTION_COUNT:-24}
      - PORT=3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',(r)=>process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  rotation-web:
    image: ghcr.io/xyl0se/rotation-app-web:latest
    container_name: rotation-web
    ports:
      - "3000:80"
    depends_on:
      rotation-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
