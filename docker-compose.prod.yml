services:
  rotation-api:
    image: ghcr.io/xyl0se/rotation-api:latest
    container_name: rotation-api
    volumes:
      - /volume1/docker/rotation:/rotation-data:rw
      - /volume1/music:/music:ro
    environment:
      - ROTATION_DATA_DIR=/rotation-data/data
      - ROTATION_MUSIC_PATH=/music
      - ROTATION_WORKSPACE_PATH=/rotation-data
      - ROTATION_SYNCTHING_ROOT=/rotation-data/exports/current-rotation
      - ROTATION_WRITE_TOKEN=${ROTATION_WRITE_TOKEN}
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  rotation-web:
    image: ghcr.io/xyl0se/rotation-app:latest
    container_name: rotation-web
    ports:
      - "3000:80"
    depends_on:
      rotation-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
