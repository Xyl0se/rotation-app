name: GitHub Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Verify tag and package versions agree
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const fs=require('fs');const expected=process.env.RELEASE_TAG.slice(1);for(const file of ['package.json','server/package.json']){const actual=JSON.parse(fs.readFileSync(file)).version;if(actual!==expected)throw new Error(file+' has '+actual+', expected '+expected)}"
      - name: Publish curated release notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_args=()
          if [[ "$RELEASE_TAG" == *-* ]]; then release_args+=(--prerelease); fi
          gh release create "$RELEASE_TAG" --verify-tag "${release_args[@]}" --title "Rotation $RELEASE_TAG" --notes-file "docs/releases/RELEASE_NOTES-$RELEASE_TAG.md"
