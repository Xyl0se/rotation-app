name: Docker Publish API

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  # OCI/Docker repository names must be lowercase. Keep this explicit so the
  # mixed-case GitHub owner name cannot leak into metadata-action.
  IMAGE_NAME: xyl0se/rotation-app-api

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          tags=("${image}:${GITHUB_SHA::7}")

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=("${image}:latest")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tags+=("${image}:${GITHUB_REF_NAME}")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
